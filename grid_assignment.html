<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Assignment</title>
    <style>
        .container {
            display: grid;
            text-align: center;
            gap: 5px;
            grid-template-areas: 
            "header header header"
            "sidebar content1 content1"
            "sidebar content2 content3"
            "footer footer footer";
        }
        #header {
            grid-area: header;
            padding: 10px;
            border: 1px solid #000;
            background-color: greenyellow;
        }
        #sidebar {
            grid-area: sidebar;
            padding: 10px;
            border: 1px solid #000;
            background-color: greenyellow;
        }
        #content1 {
            grid-area: content1;
            padding: 10px;
            border: 1px solid #000;
            background-color: greenyellow;
        }
        #content2 {
            grid-area: content2;
            padding: 10px;
            border: 1px solid #000;
            background-color: greenyellow;
        }
        #content3 {
            grid-area: content3;
            padding: 10px;
            border: 1px solid #000;
            background-color: greenyellow;
        }
        #footer {
            grid-area: footer;
            padding: 10px;
            border: 1px solid #000;
            background-color: greenyellow;
        }
    </style>
</head>
<body>
    <h1>CSS GRID</h1>
    <div class="container">
        <div id="header">Header</div>
        <div id="sidebar">Side Bar</div>
        <div id="content1">Content1</div>
        <div id="content2">Content2</div>
        <div id="content3">Content3</div>
        <div id="footer">Footer</div>
    </div>
</body>
</html>
