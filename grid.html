<!DOCTYPE html>

<head>

    <style>
        .container {
            display: grid;
            background-color: fuchsia;

            grid-template-rows: 100px 200px 100px;
            /* row-gap: 5px;
            column-gap: 5px; */

            /* dot (.) incase of empty */
